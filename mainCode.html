<!DOCTYPE html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="box">
      <div class="top_panel">
        <div class="top_panel_ui">
        <img src="assets/bet_panel3.png" class="top_panel_img" alt="Icon" >
        <div class="realUI font_shadow">
          <div class="betting-amount" id="bet-amount">
            1$
          </div>
          <div class="Multiplier-number" id="current_multiplier_value">
            -----------------------------
            x2
        </div>
        </div>
    <div class="test">
    <div class="button-container">

  <button class="bet-button" id="btn-1" onpointerdown="OnHoldBetButton(1,'btn-1')"  onpointerup="cancelHold()" oncontextmenu="return false;">
    <img src="assets/bet1e.png" class="button-overlay" alt="Icon" >
</button>
  <button class="bet-button" id="btn-2" onclick="OnClickBetButton(5,'btn-2')">
    <img src="assets/bet5e.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-3"onclick="OnClickBetButton(25,'btn-3')">
    <img src="assets/bet25e.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-4"onclick="OnClickBetButton(100,'btn-4')">
    <img src="assets/bet100e.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-5" onclick="OnClickMultiplyBetButton(2,'btn-5')">
    <img src="assets/2xe.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-6" onclick="OnClickMultiplyBetButton(5,'btn-6')">
    <img src="assets/5xe.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-7" onclick="OnClickMultiplyBetButton(10,'btn-7')">
    <img src="assets/10xe.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-8" onclick="OnClickMultiplyBetButton(1000,'btn-8')">
    <img src="assets/1000xe.png" class="button-overlay" alt="Icon" >
  </button>
  <button class="bet-button" id="btn-9">
    <img src="assets/1percente.png" class="button-overlay" alt="Icon" >
  </button>

</div>
<div class="test-centre">
<div>
    <div class="overlay-test">
    <button class="my-button" onclick="OnClickBigButton();button_animation();" id="btn-11">
      <img src="assets/big_button2.png" class="main_button" alt="Icon" >
    </button>
    <div class="multiplier_value">
    <img src="assets/multiplier_panel2.png" class="Multiplier_UI" alt="Icon">
    </div>
    </div>
    </div>
    </div>
    <div class="light">
      <div class="beautifier-div" >
      </div>
      <div class="beautifier-div">
      </div>
    </div>
</div>
  <div class="bottom_panel">
    <div class="bottom_space">
    <div class="bottom_board">
        <img src="assets/bottom_panel3.png" class="bottom_panel" alt="Icon" >
        </div>
      <div class="bottom_ui">
        <div class="bottom_ui_page_1">
        <div class="UI_column_2">
         <p id="win_percentage"> 70%</p>
         <div>
         <p id="next_win_chance" hidden>next chance 70 -> 75</p>
         </div>
         <div class="button_div_3">
          <button class="UI_button_1" id="withdraw" onclick="OnClickWithdrawButton()">
            Withdraw
          </button>
        </div>
        </div>
        <div class="UI_column_1">
          <div class="button_div_1">
          <p class="upgrade_declare font_shadow">Win Chance</p>
          <button class="UI_button_1" onclick="OnClickWinChanceUpgradeButton()">
            Upgrade
          </button>
          <p class="price_win_chance" id="win_chance_price">100</p>
        </div>
        <div class="button_div_2">
          <p class="upgrade_declare multiplier_upgrade_declare font_shadow">Multiplier</p>
          <button class="UI_button_1">
            Upgrade
          </button>
          <p class="price_win_chance" id="Multiplier_price">10000</p>
        </div>
        <div>
          </div>
        </div>
        <div class="UI_column_3">
        <div class="arrow">
          <button class="arrow_page">
          〉
          </button>
        </div>
        </div>
  </div>
<div class="in_hand_cash" id="total_amount">
    20
  </div>
  </div>
  <div id="alert_overlay">
    <div class="choice_background">
    <img src="assets/overlay_board2.png" class="choice_overlay" alt="">
    </div>
    <div class="choice_html_wrapper">
    <div class="choice_html">
      <div class="choice_html_text">
        <div class="choice_html_page_1">
        <div class="first_half_html">
          <div class="gambit_ui_1">
            if you win
            </div>
            <div class="gambit_ui_2">
              5x
              </div>
              <div class="gambit_ui_3">
                multiply your current multiplier by 5.
              </div>
              <div class="gambit_ui_4">
                <button class="accept_button">
                  accept
                </button>
                </div>
          </div>
          <div class="second_half_html">
            <div class="gambit_ui_5">
              if you loose
            <div>
              <div class="gambit_ui_6">
                -$$
              </div>
              <div class="gambit_ui_7">
                loose a large sum of money.
              </div>
              <div class="gambit_ui_8">
                <button class="reject_button">
                  reject
                  </button>
              </div>
      <div class="choice_html_page_2">
        my name is
      </div>
      </div>
      </div>
  </div>
        <script src="Decimal.js"></script>
    <script src="global_dat.js"></script>
    <script src="decimal_tetration_approximation.js"></script>
    <script src="Button.js"></script>
    </div>
</body>
<html>
